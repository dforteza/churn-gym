openapi: 3.0.3

info:
  title: Churn Gym Detector API
  description: >
    API REST para el sistema de detección temprana de churn en clientes de gimnasios.
    Permite importar modelos (clientes + visitas), calcular métricas de actividad
    y consultar niveles de riesgo de abandono por cliente.
  version: 1.0.0
  contact:
    name: Diego Forteza & Javier Escudero
    email: dfortezabenito@gmail.com

servers:
  - url: http://localhost:8080/api
    description: Desarrollo local (backend)
  - url: https://churn-gym-backend.onrender.com/api
    description: Producción (Render)

# ─── SEGURIDAD GLOBAL ──────────────────────────────────────────────────────────
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ─── SCHEMAS ────────────────────────────────────────────────────────────────
  schemas:

    # AUTH
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin1234

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        username:
          type: string
          example: admin
        rol:
          type: string
          enum: [ADMIN, USUARIO]
          example: ADMIN

    # MODELO (ImportacionCsv con resumen de métricas)
    ModeloResumen:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombreDescriptivo:
          type: string
          example: Marzo 2026
        fechaImportacion:
          type: string
          format: date-time
          example: 2026-03-21T10:30:00
        totalClientes:
          type: integer
          example: 45
        alto:
          type: integer
          example: 8
        medio:
          type: integer
          example: 15
        bajo:
          type: integer
          example: 22
        estado:
          type: string
          enum: [PROCESANDO, COMPLETADA, ERROR]
          example: COMPLETADA

    ModeloDetalle:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombreDescriptivo:
          type: string
          example: Marzo 2026
        fechaImportacion:
          type: string
          format: date-time
          example: 2026-03-21T10:30:00
        totalClientes:
          type: integer
          example: 45
        alto:
          type: integer
          example: 8
        medio:
          type: integer
          example: 15
        bajo:
          type: integer
          example: 22
        estado:
          type: string
          enum: [PROCESANDO, COMPLETADA, ERROR]
          example: COMPLETADA
        metricas:
          type: array
          items:
            $ref: '#/components/schemas/MetricaCliente'

    # MÉTRICA por cliente dentro de un modelo
    MetricaCliente:
      type: object
      properties:
        clienteId:
          type: integer
          example: 101
        nombre:
          type: string
          example: Juan
        apellidos:
          type: string
          example: García López
        email:
          type: string
          example: juan.garcia@email.com
        frecuenciaSemanal:
          type: number
          format: double
          description: Visitas medias por semana en los últimos 30 días
          example: 2.3
        semanasInactivo:
          type: integer
          description: Semanas consecutivas sin ninguna visita
          example: 3
        tendenciaMensual:
          type: number
          format: double
          description: Variación porcentual de visitas (primera vs segunda quincena)
          example: -45.2
        nivelRiesgo:
          type: string
          enum: [BAJO, MEDIO, ALTO]
          example: ALTO

    # ERRORES
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: 2026-03-21T10:30:00
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: El fichero CSV de clientes es obligatorio

# ─── ENDPOINTS ─────────────────────────────────────────────────────────────────
paths:

  # AUTH ────────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      description: Devuelve un token JWT válido para el resto de peticiones.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login correcto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciales incorrectas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # MODELOS ─────────────────────────────────────────────────────────────────────
  /modelos:
    get:
      tags: [Modelos]
      summary: Listar modelos del usuario autenticado
      description: Devuelve todos los modelos importados por el usuario ordenados por fecha descendente.
      responses:
        '200':
          description: Lista de modelos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModeloResumen'
        '401':
          description: Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Modelos]
      summary: Importar nuevo modelo
      description: >
        Recibe el nombre del modelo y dos ficheros CSV (clientes y visitas).
        Procesa los datos, calcula las métricas y devuelve el modelo completo con nivel de riesgo por cliente.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [nombre, csvClientes, csvVisitas]
              properties:
                nombre:
                  type: string
                  description: Nombre descriptivo del modelo
                  example: Marzo 2026
                csvClientes:
                  type: string
                  format: binary
                  description: >
                    CSV con columnas: cliente_id, nombre, apellidos, email,
                    fecha_nacimiento (YYYY-MM-DD), fecha_alta (YYYY-MM-DD)
                csvVisitas:
                  type: string
                  format: binary
                  description: >
                    CSV con columnas: cliente_id, fecha_visita (YYYY-MM-DD),
                    duracion_minutos
      responses:
        '201':
          description: Modelo creado y analizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModeloDetalle'
        '400':
          description: CSV inválido o campos obligatorios ausentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /modelos/{id}:
    get:
      tags: [Modelos]
      summary: Obtener detalle de un modelo
      description: Devuelve el modelo completo con la lista de clientes y sus métricas de riesgo.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Detalle del modelo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModeloDetalle'
        '403':
          description: El modelo no pertenece al usuario autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Modelo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Modelos]
      summary: Eliminar un modelo
      description: Elimina el modelo y todas sus visitas y métricas asociadas.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '204':
          description: Modelo eliminado correctamente
        '403':
          description: El modelo no pertenece al usuario autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Modelo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

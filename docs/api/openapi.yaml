
openapi: 3.0.3

info:
  title: Churn Gym Detector API
  description: >
    API REST para la detección temprana de abandono (churn) en clientes de gimnasios.
    El motor analiza datos de actividad precargados, asigna niveles de riesgo
    y agrupa a los clientes según su perfil de comportamiento.
  version: 2.0.0
  contact:
    name: Diego Forteza & Javier Escudero
    email: dfortezabenito@gmail.com

servers:
  - url: http://localhost:8080/api
    description: Desarrollo local

security:
  - bearerAuth: []

# == ENDPOINTS =================================================================
paths:

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      description: Devuelve un token JWT válido para el resto de peticiones.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login correcto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciales incorrectas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/analisis:
    get:
      tags: [Analisis]
      summary: Obtener análisis vigente
      description: >
        Devuelve el último análisis calculado con estadísticas globales y la lista paginada de clientes.
        Los contadores (totalClientes, alto, medio, bajo) siempre reflejan el total real de la BD,
        independientemente de los filtros aplicados. La lista resultados sí se filtra y pagina.
      parameters:
        - name: nivelRiesgo
          in: query
          required: false
          schema:
            type: string
            enum: [ALTO, MEDIO, BAJO]
          description: Filtrar por nivel de riesgo
          example: ALTO
        - name: grupo
          in: query
          required: false
          schema:
            type: string
            enum:
              - COSOLIDADO_EN_RIESGO
              - SOCIO_NUEVO_QUE_NO_ENGANCHA
              - SOCIO_ACTIVO_ESTABLE
              - SOCIO_IRREGULAR
          description: Filtrar por grupo de segmentación
        - name: franjaHoraria
          in: query
          required: false
          schema:
            type: string
            enum: [MANANA, TARDE, NOCHE]
          description: Filtrar por franja horaria habitual del socio
          example: MANANA
        - name: deportePrincipal
          in: query
          required: false
          schema:
            type: string
            enum: [MUSCULACION, CARDIO, CROSSFIT, CLASES_COLECTIVAS, MIXTO]
          description: Filtrar por deporte principal del socio
          example: CARDIO
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Número de página (0-indexed)
          example: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
          description: Elementos por página (máximo 100)
          example: 10
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: probabilidadAbandono,desc
          description: "Campo y dirección de ordenación. Ejemplos: probabilidadAbandono,desc — nivelRiesgo,asc"
          example: probabilidadAbandono,desc
      responses:
        '200':
          description: Análisis vigente paginado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalisisResumenResponse'
        '401':
          description: Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/analisis/ejecutar:
    post:
      tags: [Analisis]
      summary: Lanzar nuevo análisis
      description: >
        Lee los datos actuales de cliente_datos, recalcula métricas y niveles de riesgo
        para todos los clientes, sobreescribe resultado_analisis y devuelve el nuevo resultado.
      responses:
        '200':
          description: Nuevo análisis calculado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalisisResumenResponse'
        '401':
          description: Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/analisis/{id}:
    get:
      tags: [Analisis]
      summary: Obtener detalle de un cliente
      description: Devuelve el resultado de análisis completo de un cliente concreto incluyendo nombre y email.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Detalle del cliente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteAnalisisResponse'
        '404':
          description: Cliente no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/perfil:
    get:
      tags: [Perfil]
      summary: Obtener perfil del gimnasio
      description: Devuelve los datos del gimnasio asociados al usuario autenticado.
      responses:
        '200':
          description: Perfil del gimnasio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerfilResponse'
        '401':
          description: Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Perfil]
      summary: Actualizar perfil del gimnasio
      description: Actualiza parcialmente los datos del gimnasio. Solo se modifican los campos enviados.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerfilUpdateRequest'
      responses:
        '200':
          description: Perfil actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerfilResponse'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # == AUTH ==================================================================
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin1234

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        username:
          type: string
          example: admin
        rol:
          type: string
          enum: [ADMIN, USUARIO]
          example: ADMIN

    # == RESULTADO POR CLIENTE =================================================
    ClienteAnalisisResponse:
      type: object
      properties:
        clienteId:
          type: integer
          example: 1
        nombre:
          type: string
          description: Nombre del cliente (de cliente_privado)
          example: Carlos
        apellidos:
          type: string
          description: Apellidos del cliente (de cliente_privado)
          example: García Martínez
        email:
          type: string
          description: Email del cliente — para enviar notificaciones (de cliente_privado)
          example: carlos.garcia@email.com
        frecuenciaSemanal:
          type: number
          format: double
          description: Visitas medias por semana (de cliente_datos)
          example: 0.5
        semanasInactivo:
          type: integer
          description: Semanas consecutivas sin actividad (de cliente_datos)
          example: 5
        tendenciaMensual:
          type: number
          format: double
          description: Variación porcentual de actividad en el último mes (de cliente_datos)
          example: -72.0
        franjaHoraria:
          type: string
          enum: [MANANA, TARDE, NOCHE]
          example: MANANA
        deportePrincipal:
          type: string
          enum: [MUSCULACION, CARDIO, CROSSFIT, CLASES_COLECTIVAS, MIXTO]
          example: CARDIO
        mesesComoSocio:
          type: integer
          description: Antigüedad del socio en meses (de cliente_datos)
          example: 24
        nivelRiesgo:
          type: string
          enum: [BAJO, MEDIO, ALTO]
          example: ALTO
        probabilidadAbandono:
          type: number
          format: double
          description: Probabilidad de abandono en porcentaje (0-100)
          example: 91.5
        grupo:
          type: string
          description: Segmento al que pertenece el cliente
          enum:
            - COSOLIDADO_EN_RIESGO
            - SOCIO_NUEVO_QUE_NO_ENGANCHA
            - SOCIO_ACTIVO_ESTABLE
            - SOCIO_IRREGULAR
          example: COSOLIDADO_EN_RIESGO

    # == PAGINACIÓN ============================================================
    PageMetadata:
      type: object
      description: Metadatos de paginación devueltos por Spring Page
      properties:
        totalElements:
          type: integer
          description: Total de registros en BD que cumplen los filtros aplicados
          example: 12
        totalPages:
          type: integer
          description: Número total de páginas
          example: 2
        number:
          type: integer
          description: Página actual (0-indexed)
          example: 0
        size:
          type: integer
          description: Elementos por página solicitados
          example: 10
        numberOfElements:
          type: integer
          description: Elementos devueltos en esta página
          example: 10
        first:
          type: boolean
          example: true
        last:
          type: boolean
          example: false
        empty:
          type: boolean
          example: false

    # == RESUMEN DEL ANÁLISIS ==================================================
    AnalisisResumenResponse:
      type: object
      properties:
        calculadoEn:
          type: string
          format: date-time
          example: 2026-04-18T11:45:00
        totalClientes:
          type: integer
          description: Total global de clientes (independiente de los filtros aplicados)
          example: 50
        alto:
          type: integer
          description: Clientes en riesgo ALTO (global)
          example: 12
        medio:
          type: integer
          description: Clientes en riesgo MEDIO (global)
          example: 20
        bajo:
          type: integer
          description: Clientes en riesgo BAJO (global)
          example: 18
        resultados:
          description: Página de resultados filtrados y ordenados
          allOf:
            - $ref: '#/components/schemas/PageMetadata'
            - type: object
              properties:
                content:
                  type: array
                  items:
                    $ref: '#/components/schemas/ClienteAnalisisResponse'

    # == PERFIL ================================================================
    PerfilResponse:
      type: object
      properties:
        username:
          type: string
          example: diego
        email:
          type: string
          example: diego@churngym.com
        nombreGimnasio:
          type: string
          example: Churn Gym Madrid Centro
        direccion1:
          type: string
          example: Calle Gran Vía, 45
        direccion2:
          type: string
          example: Madrid, 28013
        telefono:
          type: string
          example: +34910123456
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PerfilUpdateRequest:
      type: object
      properties:
        nombreGimnasio:
          type: string
          maxLength: 100
          example: Churn Gym Madrid Centro
        direccion1:
          type: string
          maxLength: 150
          example: Calle Gran Vía, 45
        direccion2:
          type: string
          maxLength: 150
          example: Madrid, 28013
        telefono:
          type: string
          pattern: '^\+34[0-9]{9}$'
          example: +34910123456

    # == ERRORES ===============================================================
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string


openapi: 3.0.3

info:
  title: Churn Gym Detector API
  description: >
    API REST para la detección temprana de abandono (churn) en clientes de gimnasios.
    El motor analiza datos de actividad precargados, asigna niveles de riesgo
    y agrupa a los clientes según su perfil de comportamiento.
  version: 2.0.0
  contact:
    name: Diego Forteza & Javier Escudero
    email: dfortezabenito@gmail.com

servers:
  - url: http://localhost:8080/api
    description: Desarrollo local
  - url: https://churn-gym-backend.onrender.com/api
    description: Producción (Render)

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── AUTH ──────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin1234

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        username:
          type: string
          example: admin
        rol:
          type: string
          enum: [ADMIN, USUARIO]
          example: ADMIN

    # ── RESULTADO POR CLIENTE ─────────────────────────────────────────────────
    ClienteAnalisisResponse:
      type: object
      properties:
        clienteId:
          type: integer
          example: 1
        nombre:
          type: string
          description: Nombre del cliente (de cliente_privado)
          example: Carlos
        apellidos:
          type: string
          description: Apellidos del cliente (de cliente_privado)
          example: García Martínez
        email:
          type: string
          description: Email del cliente — para futuras notificaciones
          example: carlos.garcia@email.com
        frecuenciaSemanal:
          type: number
          format: double
          description: Visitas medias por semana
          example: 0.5
        semanasInactivo:
          type: integer
          description: Semanas consecutivas sin actividad
          example: 5
        tendenciaMensual:
          type: number
          format: double
          description: Variación porcentual de actividad en el último mes
          example: -72.0
        franjaHoraria:
          type: string
          enum: [MANANA, TARDE, NOCHE]
          example: MANANA
        deportePrincipal:
          type: string
          enum: [MUSCULACION, CARDIO, CROSSFIT, CLASES_COLECTIVAS, MIXTO]
          example: CARDIO
        mesesComoSocio:
          type: integer
          description: Antigüedad del socio en meses
          example: 24
        nivelRiesgo:
          type: string
          enum: [BAJO, MEDIO, ALTO]
          example: ALTO
        probabilidadAbandono:
          type: number
          format: double
          description: Probabilidad de abandono en porcentaje (0-100)
          example: 91.5
        grupo:
          type: string
          description: Segmento al que pertenece el cliente
          enum:
            - Socio consolidado en riesgo
            - Socio nuevo que no engancha
            - Socio activo estable
            - Socio irregular
          example: Socio consolidado en riesgo

    # ── RESUMEN DEL ANÁLISIS ──────────────────────────────────────────────────
    AnalisisResumenResponse:
      type: object
      properties:
        calculadoEn:
          type: string
          format: date-time
          example: 2026-04-18T11:45:00
        totalClientes:
          type: integer
          example: 50
        alto:
          type: integer
          example: 12
        medio:
          type: integer
          example: 20
        bajo:
          type: integer
          example: 18
        resultados:
          type: array
          items:
            $ref: '#/components/schemas/ClienteAnalisisResponse'

    # ── ERRORES ───────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string

# ── ENDPOINTS ─────────────────────────────────────────────────────────────────
paths:

  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      description: Devuelve un token JWT válido para el resto de peticiones.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login correcto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciales incorrectas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /analisis:
    get:
      tags: [Analisis]
      summary: Obtener análisis vigente
      description: >
        Devuelve el último análisis calculado con todos los clientes y sus métricas.
        Soporta filtrado opcional por nivel de riesgo y por grupo,
        y siempre ordena por probabilidad de abandono descendente.
      parameters:
        - name: nivelRiesgo
          in: query
          required: false
          schema:
            type: string
            enum: [ALTO, MEDIO, BAJO]
          description: Filtrar por nivel de riesgo
          example: ALTO
        - name: grupo
          in: query
          required: false
          schema:
            type: string
            enum:
              - Socio consolidado en riesgo
              - Socio nuevo que no engancha
              - Socio activo estable
              - Socio irregular
          description: Filtrar por grupo de segmentación
      responses:
        '200':
          description: Análisis vigente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalisisResumenResponse'
        '401':
          description: Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /analisis/lanzar:
    post:
      tags: [Analisis]
      summary: Lanzar nuevo análisis
      description: >
        Lee los datos actuales de cliente_datos, recalcula métricas y niveles de riesgo
        para todos los clientes, sobreescribe resultado_analisis y devuelve el nuevo resultado.
      responses:
        '200':
          description: Nuevo análisis calculado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalisisResumenResponse'
        '401':
          description: Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /analisis/cliente/{id}:
    get:
      tags: [Analisis]
      summary: Obtener detalle de un cliente
      description: Devuelve el resultado de análisis completo de un cliente concreto incluyendo nombre y email.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Detalle del cliente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteAnalisisResponse'
        '404':
          description: Cliente no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

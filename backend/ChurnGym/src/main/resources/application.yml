spring:
  application:
    name: ChurnGym

  datasource:
    url: jdbc:postgresql://localhost:5432/churngym
    username: churnadmin
    password: changeme

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: dev_secret_key_for_churngym_application_minimum_64_characters_ok!
  expiration: 86400000

clustering:
  service:
    url: http://localhost:5000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

services:
  postgres:
    image: postgres:16-alpine
    container_name: churn-gym-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: churngym
      POSTGRES_USER: churnadmin
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U churnadmin -d churngym"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
    driver: local
